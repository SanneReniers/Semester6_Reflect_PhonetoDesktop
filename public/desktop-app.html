<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reflect - Received Files</title>
  </head>
  <body>
    <h1>Files from your phone</h1>
    <div id="status">Checking for files...</div> <!-- Script will fill this in -->
    <div id="file-list"></div> <!-- Script will fill this in -->

    <script>
      async function refreshFiles() {
        const res = await fetch("/files");
        const files = await res.json(); //Returns an array of file names
        console.log(files);
        }

      refreshFiles();

      function formatBytes(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

    async function refreshFiles() {
    const statusEl = document.getElementById("status"); //Grabs references
    const listEl = document.getElementById("file-list"); //Grabs references

    const res = await fetch("/files");
    const files = await res.json();

    if (files.length === 0) {
        listEl.innerHTML = "<p>No files uploaded yet.</p>";
    } else {
        listEl.innerHTML = files
        .map(  // Creates a "A" link for each file. The download attribute makes sure that the file gets downloaded instead of opened
            (f) => `
            <a href="${f.url}" download> 
                ${f.name} (${formatBytes(f.size)})
            </a><br/>
            `
        )
        .join(""); //Joins the array into one big string
    }

    statusEl.textContent = "Last checked: " + new Date().toLocaleTimeString();

    refreshFiles();
    setInterval(refreshFiles, 2000); //Makes sure that it refreshes every 2 seconds, as the requirement mentions
}
    </script>
  </body>
</html>
