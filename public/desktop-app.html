<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reflect - Reflection</title>
    <link rel="stylesheet" href="./combined_scss.css"/>
  </head>
  <body>
    <header>
      <nav>
        <h1>RUMINOTE</h1>
        <div class="dashboard_nav">
          <img src="./images/house-icon.svg" alt="Icon of a house, outlined">
          <h3>Dashboard</h3>
        </div>

        <div class="reflect_nav active">
          <img src="/images/sparklestar_icon.svg" alt="Icon of a sparkling star, outlined">
          <h3>Reflect</h3>
        </div>

        <div class="const_nav">
          <img src="./images/star_icon.svg" alt="Icon of a star, outlined">
          <h3>Patterns & Constellations</h3>
        </div>
      </nav>

      <div class="settings_nav">
        <img src="./images/settings_icons.svg" alt="Icon of a bell and gear, outlined">
      </div>
    </header>

    <main>
      <h2>What is on your mind today, Iman?</h2>

      <div class="main_content">
        <div class="continue_reflecting">
          <h4>Continue Reflecting</h4>
          <div class="filter_cont">
            <div class="filters">
              <img src="./images/Filter_icon.svg" alt="Icon of a filter, outlined">
              <h3>Filter</h3>
            </div>

            <div class="clear_filters">
              <img src="./images/trash_icon.svg" alt="Icon of a trashcan, outlined">
              <h3>Clear filters</h3>
            </div>
          </div>

          <div id="file-list"></div> <!-- Script will fill this in -->
        </div>

        <div class="new_reflection">
          <h4>Upload new reflection</h4>

          <div class="buttons_cont">
            <div class="button">
              <img src="./images/microphone_icon.svg" alt="Icon of a microphone, outlined">
              <h3>Record</h3>
            </div>

            <div class="button">
              <img src="./images/downloadfile_icon.svg" alt="Icon of a document file, outlined">
              <h3>File</h3>
            </div>

            <div class="button">
              <img src="./images/text_icon.svg" alt="Icon of a T, outlined">
              <h3>Text</h3>
            </div>

            <div class="button qr-code">
              <img src="./images/qrcode_icon.svg" alt="Icon of a qr code, outlined">
              <h3>Upload from mobile</h3>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="overlay">
    </div>

    <div class="pop-upqr">
        <h4 class="close">X</h4>
        <div class="content">
          <h3>Upload from mobile device</h3>
          <p>Scan the QR code below to upload a reflection from your phone.</p>
          <img src="./images/qr-code.png" alt="QR code to upload a reflection from your phone">
        </div>
    </div>

    <script>
      //Button -> Pop-up
      function showToast() {
        const pop_up = document.querySelector(".pop-upqr");
        const overlay = document.querySelector(".overlay");

      pop_up.style.display = "block";
      overlay.style.display = "block";

        console.log("pop_up:");
        console.log("overlay:");
    }

    document.querySelector(".button.qr-code").addEventListener("click", showToast);

    //Pop-up -> Gone
    function closeToast() {
        const pop_up = document.querySelector(".pop-upqr");
        const overlay = document.querySelector(".overlay");

      pop_up.style.display = "none";
      overlay.style.display = "none";
    }

    document.querySelector(".close").addEventListener("click", closeToast);

      //Phone->desktop functionality
      function formatBytes(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

async function refreshFiles() {
  const listEl = document.getElementById("file-list");

  try {
    const res = await fetch("/files");
    const files = await res.json();

    if (files.length === 0) {
      listEl.innerHTML = "<p>No files uploaded yet.</p>";
    } else {
      listEl.innerHTML = files
        .map(
          (f) => `
          <div class="file-entry">
            <img src="${getIcon(f.name)}" alt="${f.name}" />
              <div class="file-info">
                <a href="${f.url}" download>
                  ${f.name}
                </a>
                <span class="upload-time">${new Date(f.uploadedAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</span>
                <br/>
              </div>
          </div>
          `
        )
        .join("");
    }

  } catch (err) {
    statusEl.textContent = "Server unreachable. Is server.js running?";
  } finally {
    setTimeout(refreshFiles, 2000);
  }
}

// Returns a certain icon based on the file type.

function getIcon(filename) {
  const ext = filename.split(".").pop().toLowerCase(); //Splits the filename up into the name and the type. Pop grabs the last element (the extension). Changes everything to lowercase. 
  const icons = {
    jpg: "./images/pdf_icon.svg",
    jpeg: "./images/pdf_icon.svg",
    png: "./images/pdf_icon.svg",
    pdf: "./images/pdf_icon.svg",
    mp3: "./images/mp4_icon.svg",
    mp4: "./images/mp4_icon.svg",
    mov: "./images/mp4_icon.svg",
    m4a: "./images/mp4_icon.svg",
    txt: "./images/document_icon.svg",
    zip: "./images/document_icon.svg",
  };
  return icons[ext] || "./images/document_icon.svg"; // fallback for unknown types
}

refreshFiles();
    </script>
  </body>
</html>
