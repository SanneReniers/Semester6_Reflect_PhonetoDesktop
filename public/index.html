<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- makes sure that it renders correctly on a phone screen -->
    <link rel="stylesheet" href="./combined_scss.css"/>
    <title>RUMINOTE - Upload a File</title>
  </head>
  <body>
    <header>
      <nav>
        <h1>RUMINOTE</h1>
      </nav>
    </header>

    <h2>Upload a reflection</h2>
    <form id="upload-form" action="/upload" method="POST" enctype="multipart/form-data"> <!-- Without this, the files would be send as plain text, which in turn would corrupt the files -->
      <label for="file-input" class="file-button">Choose file</label>
      <input type="file" name="file" id="file-input" required />
      <span id="file-name">No file chosen</span> <!-- Script will fill this in -->
      <button id="submit-btn" type="submit">Upload</button>
    </form>
    <p id="status"></p> <!-- Script will fill this in -->

    <script>
        const form = document.getElementById("upload-form");
        const button = document.getElementById("submit-btn");
        const status = document.getElementById("status");

        form.addEventListener("submit", () => { //Runs when the form is submitted 
            status.textContent = "Uploading...";
            button.disabled = true; //Prevents the user from double clicking the button
            button.textContent = "Uploading..."; //Second visual clue
        });

        document.getElementById("file-input").addEventListener("change", (event) => {
          console.log("files:", event.target.files);
          const fileName = event.target.files[0]?.name; //List of selected files, gets the first file, error handling
          document.getElementById("file-name").textContent = fileName || "No file chosen"; //Fallback
        });
    </script>
  </body>
</html>
