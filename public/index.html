<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- makes sure that it renders correctly on a phone screen -->
    <link rel="stylesheet" href="./combined_scss.css"/>
    <title>RUMINOTE - Upload a File</title>
  </head>
  <body>
    <header>
      <nav>
        <h1>RUMINOTE</h1>
      </nav>
    </header>

    <h2>Upload a reflection</h2>
    <form id="upload-form" action="/upload" method="POST" enctype="multipart/form-data"> <!-- Without this, the files would be send as plain text, which in turn would corrupt the files -->
      <label for="file-input" class="file-button">Choose file</label>
      <input type="file" name="file" id="file-input"/>
      <span id="file-name">No file chosen</span> <!-- Script will fill this in -->
      <input type="text" id="custom-name" placeholder="Custom name (optional)" />
      <button id="submit-btn" type="submit">Upload</button>
    </form>
    <p id="status"></p> <!-- Script will fill this in -->

    <script>
        const form = document.getElementById("upload-form");
        const button = document.getElementById("submit-btn");
        const status = document.getElementById("status");

    form.addEventListener("submit", async (event) => {
    event.preventDefault(); // stops the browser from navigating away

  if (!document.getElementById("file-input").files[0]) {
    status.textContent = "Please choose a file first.";
    return;
  }

  const formData = new FormData(form); // packages the form's file into a format fetch can send
  const customName = document.getElementById("custom-name").value;
  formData.append("customName", customName); // adds it to the request
  
  status.textContent = "Uploading...";
  button.disabled = true;
  button.textContent = "Uploading...";

  try {
    const res = await fetch("/upload", { method: "POST", body: formData });
    const data = await res.json();

    if (data.success) {
      status.textContent = "Your reflection has been uploaded successfully!";
      button.disabled = false;
      button.textContent = "Upload";
      
    } else {
      status.textContent = `Error: ${data.error}`;
      button.disabled = false;
      button.textContent = "Upload";
    }
  } catch (err) {
    status.textContent = "Upload failed. Is the server running?";
    button.disabled = false;
    button.textContent = "Upload";
  }
});

        document.getElementById("file-input").addEventListener("change", (event) => {
          console.log("files:", event.target.files);
          const fileName = event.target.files[0]?.name; //List of selected files, gets the first file, error handling
          document.getElementById("file-name").textContent = fileName || "No file chosen"; //Fallback
        });
    </script>
  </body>
</html>
